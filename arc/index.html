  var eyebrowStyle = opts.eyebrow || eyebrow;
  var titleColor = opts.title || '#fff';
  var introColor = opts.intro || MUTE;
  return '<div class="brand-sec-head"><p style="'+eyebrowStyle+';margin:0 0 12px">'+eyebrowText+'</p><h2 style="font-size:clamp(24px,3.2vw,38px);line-height:1.05;margin:0;color:'+titleColor+';letter-spacing:-.03em;font-weight:800">'+title+'</h2>'+(intro ? '<p class="brand-sec-intro" style="color:'+introColor+'">'+intro+'</p>' : '')+'</div>';
}
function brandValueSection(b){
  if (!b.valueProps) return '';
  var cards = b.valueProps.map(function(v){ return '<div class="arc-card" style="padding:24px;text-align:center"><h3 style="margin:0 0 8px;color:#fff;font-size:17px;font-weight:800">'+v.title+'</h3><p style="margin:0;color:'+MUTE+';font-size:14.5px;line-height:1.55">'+v.body+'</p></div>'; }).join('');
  return '<section class="brand-section"><div style="'+W+'">'+brandSecHead('Why '+b.name, 'What makes this service different.', b.intro)+'<div class="brand-sec-body" style="display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:16px">'+cards+'</div></div></section>';
}
function brandIncludedSection(b, bullets, siteExtra){
  var extra = siteExtra ? siteExtra.replace('margin:20px 0 0', 'margin:24px auto 0').replace('max-width:720px', 'max-width:720px;text-align:center') : '';
  return '<section class="brand-section"><div style="'+W+'">'+brandSecHead('What\'s included', b.eyebrow+' with '+b.name)+'<div class="brand-sec-body" style="display:grid;grid-template-columns:repeat(auto-fit,minmax(300px,1fr));gap:4px 40px">'+bullets+'</div>'+extra+'</div></section>';
}
function brandStepsSection(b){
  if (!b.steps) return '';
  var items = b.steps.map(function(s,i){ return '<div class="arc-card" style="padding:24px;text-align:center"><div style="width:44px;height:44px;border-radius:50%;background:'+GRADCIRC+';color:#fff;display:flex;align-items:center;justify-content:center;font-weight:900;font-size:17px;margin:0 auto 16px">'+(i+1)+'</div><h3 style="margin:0 0 8px;color:#fff;font-size:16px;font-weight:800">'+s.title+'</h3><p style="margin:0;color:'+MUTE+';font-size:14.5px;line-height:1.5">'+s.body+'</p></div>'; }).join('');
  return '<section class="brand-section" style="background:linear-gradient(180deg,rgba(29,78,216,.08),transparent)"><div style="'+W+'">'+brandSecHead('How it works', 'Getting started with '+b.name)+'<div class="brand-sec-body" style="display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:16px">'+items+'</div></div></section>';
}
function brandIdealSection(b){
  if (!b.idealFor) return '';
  var items = b.idealFor.map(function(li){ return '<div class="arc-card" style="display:flex;align-items:flex-start;gap:12px;padding:20px 22px"><span aria-hidden="true" style="width:26px;height:26px;border-radius:50%;background:rgba(52,168,83,.18);color:#34A853;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:12px;font-weight:900">&check;</span><span style="color:#e8edf4;font-size:15px;line-height:1.45">'+li+'</span></div>'; }).join('');
  return '<section class="brand-section"><div style="'+W+'">'+brandSecHead('Who it\'s for', 'Ideal for Sydney households who…')+'<div class="brand-sec-body" style="display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:14px">'+items+'</div></div></section>';
}
function brandAreasSection(){
  var chips = areas.map(function(a){ return '<span style="padding:8px 14px;border-radius:999px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.14);color:#fff;font-weight:700;font-size:13px">'+a+'</span>'; }).join('');
  return '<section class="brand-section-tight" style="background:linear-gradient(180deg,rgba(52,168,83,.1),rgba(29,78,216,.12))"><div style="'+W+';text-align:center">'+brandSecHead('Service areas', 'Across Sydney', 'Regular visits across the Eastern Suburbs, Inner West, North Shore and Greater Sydney. Tell us your suburb when you enquire.')+'<div class="brand-sec-body" style="display:flex;flex-wrap:wrap;gap:8px;justify-content:center">'+chips+'</div></div></section>';

function brandFaqSection(b){
  if (!b.faqs) return '';
  var items = b.faqs.map(function(f,i){ return '<details class="faq"'+(i===0?' open':'')+'><summary>'+f.q+'</summary><div class="faq-a">'+f.a+'</div></details>'; }).join('');
  return '<section class="brand-section"><div style="'+W+'">'+brandSecHead('FAQs', 'Common questions')+'<div class="brand-sec-faq">'+items+'</div></div></section>';
}
function brandRelatedSection(b){
  if (!b.related || !b.related.length) return '';
  var cards = b.related.map(function(k){ var r = brandByKey(k); return '<a href="#/brand/'+r.key+'" class="arc-card glasshover" style="cursor:pointer;display:flex;align-items:center;gap:14px;padding:16px 18px">'+brandBadge(r,44)+'<span><span style="display:block;font-weight:900;color:#fff;font-size:15px">'+r.name+'</span><span style="display:block;color:'+MUTE+';font-size:13px;margin-top:2px">'+r.short+'</span></span></a>'; }).join('');
  return '<section class="brand-section-tight"><div style="'+W+'">'+brandSecHead('More from ARC', 'Related home services')+'<div class="brand-sec-body" style="display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:14px">'+cards+'</div></div></section>';
}
function brandSocialProof(b){

function pageBrand(key){
  var b = brandByKey(key);

  var siteLink = '';
  if (b.site && !b.sitePlaceholder) siteLink = '<a href="'+b.site+'" target="_blank" rel="noopener" class="btns" style="'+btnSecondary+'">'+b.siteLabel+' &rarr;</a>';
  else if (b.sitePlaceholder) siteLink = '<span style="display:inline-flex;align-items:center;padding:12px 20px;border-radius:999px;font-weight:800;font-size:14px;color:rgba(255,255,255,.5);border:1px dashed rgba(255,255,255,.3)">'+b.siteLabel+' (link coming)</span>';
  var siteExtra = '';

  else if (b.siteTeaser && b.sitePlaceholder) siteExtra = '<p style="margin:20px 0 0;color:'+MUTE+';font-size:14.5px;line-height:1.55">'+b.siteTeaser+'</p>';
  return '<main>'+
    '<section class="arc-hero" style="position:relative;padding:44px 0 36px;min-height:min(380px,68vh)"><div style="'+W+';position:relative;z-index:3">'+
      '<nav aria-label="Breadcrumb" style="margin-bottom:18px"><a href="#/" style="display:inline-flex;align-items:center;gap:6px;color:'+MUTE+';font-weight:700;font-size:13.5px">&larr; All ARC brands</a></nav>'+
      '<div class="brand-hero-row">'+
        '<div class="brand-hero-content">'+
          '<div style="display:flex;align-items:center;gap:14px;margin-bottom:14px">'+brandBadge(b,60)+
            '<div><p style="'+eyebrow+';color:#34A853;margin:0 0 4px;font-size:11px;letter-spacing:.16em">'+b.eyebrow+'</p><h1 style="font-size:clamp(28px,3.8vw,48px);line-height:1.02;margin:0;color:#fff;letter-spacing:-.02em;font-weight:900">'+b.name+'</h1></div></div>'+
          '<p class="arc-grad-text" style="font-size:17px;font-style:italic;font-weight:700;margin:0 0 12px;display:inline-block">'+b.tagline+'</p>'+
          '<p style="font-size:16.5px;color:'+MUTE+';max-width:520px;margin:0 0 16px;line-height:1.55">'+b.blurb+'</p>'+
          '<div style="display:flex;flex-wrap:wrap;gap:8px;margin-bottom:14px">'+brandTrustStrip()+'</div>'+

        '</div>'+
        '<div class="brand-form-col" id="quote">'+brandForm(b)+'</div>'+
      '</div>'+
    '</div></section>'+
    brandValueSection(b)+
    brandIncludedSection(b, bullets, siteExtra)+
    brandStepsSection(b)+
    brandIdealSection(b)+
    brandAreasSection()+
    brandFaqSection(b)+
    brandSocialProof(b)+
    brandRelatedSection(b)+
    ctaBlock()+'</main>';
}
function compactField(label, id, ph, req){
  var type = id==='f-email' ? 'email' : (id==='f-phone' ? 'tel' : 'text');
  var ac = id==='f-name' ? 'name' : (id==='f-email' ? 'email' : (id==='f-phone' ? 'tel' : (id==='f-suburb' ? 'address-level2' : 'off')));
  return '<label class="bf-field" style="display:flex;flex-direction:column;gap:5px"><span class="bf-label" style="font-weight:700;color:#fff;font-size:12.5px">'+label+(req?' <span style="color:#34A853" aria-hidden="true">*</span>':'')+'</span><input id="'+id+'" name="'+id+'" type="'+type+'" autocomplete="'+ac+'" placeholder="'+ph+'"'+(req?' required aria-required="true"':'')+' aria-describedby="e-'+id+'" style="'+inputStyle+'" /><span id="e-'+id+'" style="color:#ff9b8a;font-size:11px;font-weight:600"></span></label>';
}
function brandForm(b){
  return '<div id="form-card" class="arc-card brand-quote-form">'+
    '<input type="text" id="company" name="company" tabindex="-1" autocomplete="off" aria-hidden="true" style="position:absolute;left:-9999px;width:1px;height:1px;opacity:0">'+
    '<h2 style="font-size:18px;margin:0 0 14px;color:#fff;font-weight:800">Get a quote <span style="font-weight:600;color:'+MUTE2+';font-size:13px">· '+b.name+'</span></h2>'+
    '<div class="bf-grid">'+compactField('Name','f-name','Your name',true)+compactField('Email','f-email','Email',true)+'</div>'+
    '<div class="bf-grid">'+compactField('Phone','f-phone','Phone',true)+compactField('Suburb','f-suburb','Suburb',false)+'</div>'+
    '<label style="display:flex;flex-direction:column;gap:5px;margin-bottom:12px"><span class="bf-label" style="font-weight:700;color:#fff;font-size:12.5px">Notes <span style="font-weight:500;color:'+MUTE2+'">(optional)</span></span><textarea id="f-message" name="f-message" placeholder="Frequency, priorities…" rows="1" style="'+inputStyle+'"></textarea></label>'+
    '<p id="form-error" role="alert" style="margin:0 0 6px;color:#ff9b8a;font-size:11px;font-weight:600;display:none">Please complete the required fields.</p>'+
    '<button type="button" onclick="submitForm()" class="btnp bf-submit" style="width:100%;border-radius:999px;border:none;font-family:inherit;font-weight:800;color:#fff;cursor:pointer">Request quote</button>'+

}

/* ============================ BLOG ============================ */
function pageBlog(){
  var cats = categories.map(function(c){ return '<span style="padding:9px 16px;border-radius:999px;border:1px solid rgba(255,255,255,.22);color:#fff;font-weight:700;font-size:13.5px;background:rgba(255,255,255,.05)">'+c+'</span>'; }).join('');
  var grid = posts.map(postCard).join('');
  return '<main><section class="arc-hero" style="position:relative;padding:72px 0 28px"><div style="'+W+';position:relative;z-index:3"><p style="'+eyebrow+';margin:0 0 14px">'+PAGES.blog.eyebrow+'</p><h1 style="font-size:clamp(38px,5.4vw,64px);line-height:1;margin:0 0 16px;color:#fff;letter-spacing:-.04em;font-weight:800;max-width:760px">'+PAGES.blog.title+'</h1><div style="display:flex;flex-wrap:wrap;gap:10px;margin-top:22px">'+cats+'</div></div></section><section style="padding:36px 0 72px"><div style="'+W+'"><div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:24px">'+grid+'</div></div></section></main>';
}

/* ===================== CONTACT ===================== */
function pageContact(){
  var reass = reassurance.map(function(r){ return '<div style="display:flex;align-items:center;gap:12px"><span aria-hidden="true" style="width:22px;height:22px;border-radius:50%;background:rgba(52,168,83,.18);color:#34A853;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:12px;font-weight:900">&check;</span><span style="color:#e8edf4;font-size:15px;font-weight:600">'+r+'</span></div>'; }).join('');
  var areaChips = areas.map(function(a){ return '<span style="padding:7px 13px;border-radius:999px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.14);color:#fff;font-weight:700;font-size:13px">'+a+'</span>'; }).join('');
  var left = '<div style="flex:1 1 320px;min-width:290px;position:sticky;top:100px"><p style="'+eyebrow+';margin:0 0 14px">'+PAGES.contact.eyebrow+'</p><h1 style="font-size:clamp(34px,4.4vw,54px);line-height:1;margin:0 0 18px;color:#fff;letter-spacing:-.04em;font-weight:800">'+PAGES.contact.title+'</h1><p style="font-size:17px;color:'+MUTE+';margin:0 0 28px">'+PAGES.contact.intro+'</p><a href="tel:'+PHONE_TEL+'" class="arc-card" style="display:flex;align-items:center;gap:16px;padding:20px 24px;margin-bottom:24px;text-decoration:none"><div style="width:46px;height:46px;border-radius:50%;background:'+GRADCIRC+';display:flex;align-items:center;justify-content:center;flex-shrink:0">'+icon('phone','#fff',22)+'</div><div><p style="margin:0;color:'+MUTE2+';font-size:12px;font-weight:700;letter-spacing:.06em;text-transform:uppercase">Prefer to talk?</p><p style="margin:2px 0 0;color:#fff;font-size:22px;font-weight:900">'+PHONE+'</p></div></a><div style="display:flex;flex-direction:column;gap:12px;margin-bottom:28px">'+reass+'</div><div class="arc-card" style="padding:24px"><p style="text-transform:uppercase;letter-spacing:.14em;color:'+MUTE2+';font-weight:900;font-size:11px;margin:0 0 14px">Areas served</p><div style="display:flex;flex-wrap:wrap;gap:8px">'+areaChips+'</div></div></div>';
  var serviceChips = brandDefs.map(function(b){ var on = state.services.indexOf(b.key)!==-1; return '<button type="button" class="chip'+(on?' on':'')+'" aria-pressed="'+(on?'true':'false')+'" data-key="'+b.key+'" onclick="toggleService(this)">'+b.name+'</button>'; }).join('');
  var freqChips = freqOptions.map(function(v){ var on = state.frequency===v; return '<button type="button" class="chip'+(on?' on':'')+'" aria-pressed="'+(on?'true':'false')+'" data-val="'+v+'" onclick="setFreq(this)">'+v+'</button>'; }).join('');
  var form = '<div id="form-card" class="arc-card" style="padding:clamp(26px,4vw,44px)"><input type="text" id="company" name="company" tabindex="-1" autocomplete="off" aria-hidden="true" style="position:absolute;left:-9999px;width:1px;height:1px;opacity:0"><div style="display:flex;flex-wrap:wrap;gap:16px;margin-bottom:18px">'+field('Full name','f-name','Jane Smith',true)+field('Email','f-email','jane@email.com',true)+'</div><div style="display:flex;flex-wrap:wrap;gap:16px;margin-bottom:22px">'+field('Phone','f-phone','0400 000 000',true)+field('Suburb','f-suburb','Rose Bay',false)+'</div><p style="'+labelSpan+';margin:0 0 12px">Which services?</p><div role="group" aria-label="Which services" style="display:flex;flex-wrap:wrap;gap:9px;margin-bottom:22px">'+serviceChips+'</div><p style="'+labelSpan+';margin:0 0 12px">Preferred frequency</p><div role="group" aria-label="Preferred frequency" style="display:flex;flex-wrap:wrap;gap:9px;margin-bottom:22px">'+freqChips+'</div><label style="display:flex;flex-direction:column;gap:7px;margin-bottom:22px"><span style="'+labelSpan+'">Anything else?</span><textarea id="f-message" name="f-message" placeholder="Tell us how we can help." rows="4" style="'+inputStyle+';resize:vertical"></textarea></label><p id="form-error" role="alert" style="margin:0 0 16px;color:#ff9b8a;font-size:14px;font-weight:600;display:none">Please complete the highlighted fields above.</p><button type="button" onclick="submitForm()" class="btnp" style="width:100%;padding:17px;border-radius:999px;font-family:inherit;font-weight:800;font-size:16px;color:#fff;cursor:pointer;display:inline-flex;align-items:center;justify-content:center">Request my quote</button><p style="text-align:center;color:'+MUTE2+';font-size:12.5px;margin:14px 0 0">Goes to the ARC team · '+EMAIL+'</p></div>';
  return '<main><section style="padding:64px 0 40px"><div style="'+W+';display:flex;flex-wrap:wrap;gap:48px;align-items:flex-start">'+left+'<div style="flex:1 1 440px;min-width:300px" id="quote">'+form+'</div></div></section></main>';
}

function field(label, id, ph, req){
  var type = id==='f-email' ? 'email' : (id==='f-phone' ? 'tel' : 'text');
  var ac = id==='f-name' ? 'name' : (id==='f-email' ? 'email' : (id==='f-phone' ? 'tel' : (id==='f-suburb' ? 'address-level2' : 'off')));
  return '<label style="flex:1 1 200px;display:flex;flex-direction:column;gap:7px"><span style="'+labelSpan+'">'+label+(req?' <span style="color:#34A853" aria-hidden="true">*</span>':'')+'</span><input id="'+id+'" name="'+id+'" type="'+type+'" autocomplete="'+ac+'" placeholder="'+ph+'"'+(req?' required aria-required="true"':'')+' aria-describedby="e-'+id+'" style="'+inputStyle+'" /><span id="e-'+id+'" style="color:#ff9b8a;font-size:12.5px;font-weight:600"></span></label>';
}
function successCard(){ return '<div role="status" aria-live="polite" class="arc-card" style="padding:clamp(32px,5vw,56px);text-align:center"><div aria-hidden="true" style="width:64px;height:64px;border-radius:50%;background:'+GRADCIRC+';display:flex;align-items:center;justify-content:center;margin:0 auto 22px;color:#fff;font-size:30px;font-weight:900">&check;</div><h2 style="font-size:30px;margin:0 0 12px;color:#fff;letter-spacing:-.02em;font-weight:800">Thank you - we\'ll be in touch.</h2><p style="font-size:16.5px;color:'+MUTE+';margin:0 0 26px">We\'ve received your enquiry and a member of the ARC team will be in contact shortly.</p><button type="button" onclick="resetForm()" class="btnp" style="cursor:pointer;display:inline-flex;padding:14px 28px;border-radius:999px;font-weight:800;color:#fff;font-family:inherit;font-size:15px">Submit another enquiry</button></div>'; }

/* ============================ ROUTER ============================ */
var state = { page:'home', drawerOpen:false, services:[], frequency:'', submitted:false };
var renderers = { home:pageHome, services:pageServices, about:pageAbout, careers:pageCareers, news:pageNews, testimonials:pageTestimonials, blog:pageBlog, contact:pageContact };

function hashToPage(h){
  h = h || '';
  if (h.charAt(0) === '#') h = h.slice(1);
  if (h === '') return 'home';
  if (h.charAt(0) !== '/') return null;
  if (h === '/') return 'home';
  var m = h.match(/^\/brand\/(.+)$/);
  if (m) return brandExists(m[1]) ? 'brand:'+m[1] : 'home';
  var pg = h.slice(1);
  return renderers[pg] ? pg : 'home';
}
function applyPage(p){ state.page = p; state.drawerOpen = false; state.submitted = false; state.services = []; state.frequency = ''; }

function render(){
  var body;
  if (state.page.indexOf('brand:') === 0) body = pageBrand(state.page.slice(6));
  else body = (renderers[state.page] || pageHome)();
  body = body.replace('<main', '<main id="main-content" tabindex="-1"');
  document.getElementById('app').innerHTML = header() + body + footer() + stickyBar();
  if (state.submitted){ var fc = document.getElementById('form-card'); if (fc) fc.outerHTML = successCard(); }
  updateHead();
}

var PAGE_META = {
  home:'ARC Home Services Group brings cleaning, housekeeping, gardens, pools and complete home care together under one trusted relationship for busy families.',
  services:'Explore all ARC home services - cleaning, housekeeping, gardens, pools, handyman and more. One trusted group, a specialist for every job.',
  about:'About ARC Home Services Group - Australia\'s trusted umbrella of premium home service brands across Sydney.',
  careers:'Careers at ARC Home Services Group - join Australia\'s most trusted home services group.',
  news:'News and updates from ARC Home Services Group.',
  testimonials:'Client testimonials from ARC Home Services Group households across Sydney.',
  blog:'The ARC Journal - ideas for a calmer, better-run home.',
  contact:'Get a quote from ARC Home Services Group. Tell us about your home and we\'ll match the right specialist.'
};

function updateHead(){
  var md = document.getElementById('meta-desc');
  if (state.page.indexOf('brand:') === 0){ var b = brandByKey(state.page.slice(6)); document.title = b.name + ' - ' + b.eyebrow + ' | ' + SITE_NAME; if (md) md.content = b.metaDesc || (b.name + ' by ' + SITE_NAME + '. ' + b.tagline + ' Request a quote across Sydney.'); setFavicon(BRAND_ICONS[b.g]); }
  else { document.title = SITE_NAME + ' - One Trusted Group. Multiple Specialists.'; if (md) md.content = PAGE_META[state.page] || PAGE_META.home; setFavicon("<path fill='none' stroke='#fff' stroke-width='2.4' stroke-linecap='round' d='M5 16c3-6 11-7 14-3'/>"); }
}
function go(p){ applyPage(p); render(); window.scrollTo(0,0); if (location.hash !== hrefFor(p)) location.hash = hrefFor(p); }
function quoteClick(){
  if (state.page.indexOf('brand:') === 0){
    if (state.drawerOpen){ state.drawerOpen = false; render(); }
    focusQuote();
  } else { go('contact'); }
}
function toggleNav(){ state.drawerOpen = !state.drawerOpen; render(); }
function scrollBrands(){ var el = document.getElementById('brands'); if (el) el.scrollIntoView({behavior:'smooth'}); }
function focusQuote(){ var el = document.getElementById('quote'); if (el) el.scrollIntoView({behavior:'smooth'}); }
function toggleService(btn){ var k = btn.getAttribute('data-key'); var i = state.services.indexOf(k); if (i===-1){ state.services.push(k); btn.classList.add('on'); btn.setAttribute('aria-pressed','true'); } else { state.services.splice(i,1); btn.classList.remove('on'); btn.setAttribute('aria-pressed','false'); } }
function setFreq(btn){ state.frequency = btn.getAttribute('data-val'); var s = btn.parentNode.querySelectorAll('.chip'); for (var i=0;i<s.length;i++){ s[i].classList.remove('on'); s[i].setAttribute('aria-pressed','false'); } btn.classList.add('on'); btn.setAttribute('aria-pressed','true'); }
function val(id){ var el = document.getElementById(id); return el ? el.value.trim() : ''; }
function submitForm(){
  var fields = [ {id:'f-name',msg:'Please enter your name.'},{id:'f-email',msg:'Please enter your email.'},{id:'f-phone',msg:'Please enter a phone number.'} ];
  var hasErr = false;
  fields.forEach(function(f){ var e = document.getElementById('e-'+f.id); var v = val(f.id); var err = '';
    if (!v) err = f.msg; else if (f.id==='f-email' && !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(v)) err = 'Please enter a valid email.';
    if (e) e.textContent = err;
    var inp = document.getElementById(f.id); if (inp) inp.setAttribute('aria-invalid', err ? 'true' : 'false');
    if (err) hasErr = true; });
  var fe = document.getElementById('form-error');
  if (hasErr){ if (fe){ fe.textContent = 'Please complete the required fields.'; fe.style.display = 'block'; } return; }
  if (fe) fe.style.display = 'none';

  var payload = {
    name: val('f-name'), email: val('f-email'), phone: val('f-phone'),
    suburb: val('f-suburb'), message: val('f-message'),
    company: val('company'), page: location.href
  };
  if (state.page.indexOf('brand:') === 0){ payload.service = brandByKey(state.page.slice(6)).name; }
  else { payload.service = state.services.map(function(k){ return brandByKey(k).name; }).join(', '); payload.frequency = state.frequency; }

  var btn = document.querySelector('#form-card button');
  var label = btn ? btn.textContent : '';
  if (btn){ btn.disabled = true; btn.textContent = 'Sending…'; }

  var endpoint = AB.replace('assets/', 'send-quote.php');
  fetch(endpoint, { method:'POST', headers:{ 'Content-Type':'application/json' }, body: JSON.stringify(payload) })
    .then(function(r){ return r.json().catch(function(){ return { ok:false }; }); })
    .then(function(res){
      if (!res || !res.ok) throw new Error('send');
      state.submitted = true;
      var fc = document.getElementById('form-card'); if (fc) fc.outerHTML = successCard();
      var q = document.getElementById('quote'); if (q) q.scrollIntoView({behavior:'smooth'});
    })
    .catch(function(){
      if (btn){ btn.disabled = false; btn.textContent = label; }
      if (fe){ fe.textContent = 'Sorry - we could not send that. Please call ' + PHONE + ' or email ' + EMAIL + '.'; fe.style.display = 'block'; }
    });
}
function resetForm(){ state.submitted = false; render(); var q = document.getElementById('quote'); if (q) q.scrollIntoView(); }

window.addEventListener('hashchange', function(){ var p = hashToPage(location.hash); if (p && p !== state.page){ applyPage(p); render(); window.scrollTo(0,0); } });

window.go = go; window.quoteClick = quoteClick; window.toggleNav = toggleNav; window.scrollBrands = scrollBrands; window.focusQuote = focusQuote; window.toggleService = toggleService; window.setFreq = setFreq; window.submitForm = submitForm; window.resetForm = resetForm;

/* ---- editable content: admin.php writes content.json; apply overrides before first render ---- */
function applyContent(c){
  if (!c) return;
  var g = c.global || {};
  if (g.heroEyebrow) HERO.eyebrow = g.heroEyebrow;
  if (g.heroTitle1)  HERO.t1 = g.heroTitle1;
  if (g.heroTitle2)  HERO.t2 = g.heroTitle2;
  if (g.heroSub)     HERO.sub = g.heroSub;
  if (g.phone)    PHONE = g.phone;
  if (g.phoneTel) PHONE_TEL = g.phoneTel;
  if (g.email)    EMAIL = g.email;
  var ps = c.pages || {};
  Object.keys(ps).forEach(function(pg){
    if (!PAGES[pg] || !ps[pg]) return;
    Object.keys(ps[pg]).forEach(function(k){ if (ps[pg][k]) PAGES[pg][k] = ps[pg][k]; });
  });
  var bs = c.brands || {};
  brandDefs.forEach(function(b){
    var o = bs[b.key]; if (!o) return;
    ['name','eyebrow','tagline','short','blurb','intro','formIntro','messagePlaceholder'].forEach(function(k){ if (o[k]) b[k] = o[k]; });
    if (o.bullets){
      var arr = Array.isArray(o.bullets) ? o.bullets : String(o.bullets).split('\n');
      arr = arr.map(function(s){ return s.trim(); }).filter(Boolean);
      if (arr.length) b.bullets = arr;
    }
  });
}
applyPage(hashToPage(location.hash) || 'home');
fetch(AB.replace('assets/','') + 'content.json?ts=' + VER, {cache:'no-store'})
  .then(function(r){ return r.ok ? r.json() : null; })
  .then(function(c){ window.__ARC_CONTENT = c; applyContent(c); render(); })
  .catch(function(){ render(); });
</script>
</body>
</html>
